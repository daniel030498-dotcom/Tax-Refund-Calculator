        <option value="3" ${s.rentalTrack==3?'selected':''}>3 — מדרגות</option>
      </select>
      <span class="unit"></span>
    </div>`;

  if (r.rentalYearly > 0) {
    html += `<div style="margin-top:16px;display:grid;grid-template-columns:1fr 120px 100px;gap:8px;padding:8px 0;font-size:0.78rem;color:var(--text-muted);font-weight:600">
      <span>השוואת מסלולים</span><span>מס</span><span></span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 120px 100px;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);align-items:center">
      <span style="font-size:0.85rem">מסלול 1: פטור (תקרה ${formatNumber(exemptMonthly)} ₪/חודש)</span>
      <span class="computed-value">${formatNumber(r.rentalTaxTrack1)}</span>
      ${r.rentalBestTrack === 1 ? '<span class="badge badge-success">מומלץ ✓</span>' : '<span></span>'}
    </div>
    <div style="display:grid;grid-template-columns:1fr 120px 100px;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);align-items:center">
      <span style="font-size:0.85rem">מסלול 2: מס 10%</span>
      <span class="computed-value">${formatNumber(r.rentalTaxTrack2)}</span>
      ${r.rentalBestTrack === 2 ? '<span class="badge badge-success">מומלץ ✓</span>' : '<span></span>'}
    </div>
    <div style="display:grid;grid-template-columns:1fr 120px 100px;gap:8px;padding:8px 0;align-items:center">
      <span style="font-size:0.85rem">מסלול 3: מדרגות מס</span>
      <span class="computed-value">${formatNumber(r.rentalTaxTrack3)}</span>
      ${r.rentalBestTrack === 3 ? '<span class="badge badge-success">מומלץ ✓</span>' : '<span></span>'}
    </div>`;
  }

  html += `<div class="summary-row total">
    <label>מס חייב על שכירות (מסלול ${s.rentalTrack})</label>
    <span class="computed-value negative">${formatNumber(r.rentalTax)}</span>
    <span class="unit">₪</span>
  </div></div>`;

  // ---- SEVERANCE ----
  html += `<div class="section-card" id="severance_${year}">
    <div class="section-title">📦 פיצויי פיטורים / מענק פרישה (טופס 161)</div>
    <div class="form-row"><label>סה"כ מענק פרישה / פיצויים שהתקבלו</label>${inputField(year,'severanceAmount')}<span class="unit">₪</span></div>
    <div class="form-row"><label>משכורת אחרונה (חודשית)</label>${inputField(year,'lastSalary')}<span class="unit">₪</span></div>
    <div class="form-row"><label>מספר שנות עבודה (כולל חלקי שנה)</label>${inputField(year,'yearsWorked')}<span class="unit">שנים</span></div>
    <div class="form-row"><label>מס שנוכה במקור על הפיצויים</label>${inputField(year,'severanceTaxWithheld')}<span class="unit">₪</span></div>
    <div class="form-row"><label>פיצויים פטורים לפי סעיף 9(7א)</label>${inputField(year,'severanceExempt209')}<span class="unit">₪</span></div>

    <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <div class="section-subtitle">חישוב פטור ממס</div>
      <div class="form-row"><label>תקרת פטור לשנה (${year})</label><span class="computed-value">${formatNumber(TAX_DATA.severanceExemptPerYear[year])}</span><span class="unit">₪/שנה</span></div>
      <div class="form-row"><label>סכום פטור ממס</label><span class="computed-value positive">${formatNumber(r.severanceExempt)}</span><span class="unit">₪</span></div>
      <div class="form-row"><label>סכום חייב במס</label><span class="computed-value">${formatNumber(r.severanceTaxable)}</span><span class="unit">₪</span></div>
      <div class="form-row"><label>מס משוער על חלק חייב</label><span class="computed-value negative">${formatNumber(r.severanceTax)}</span><span class="unit">₪</span></div>
    </div>
    <div class="summary-row total">
      <label>החזר/(חוב) מס על פיצויים</label>
      <span class="computed-value ${r.severanceRefund >= 0 ? 'positive' : 'negative'}">${r.severanceRefund >= 0 ? '+' : ''}${formatNumber(r.severanceRefund)}</span>
      <span class="unit">₪</span>
    </div>
    <div class="tip-box">💡 ניתן לבצע פריסת מס קדימה/אחורה — מומלץ להתייעץ עם יועץ מס</div>
  </div>`;

  // ---- SURTAX ----
  html += `<div class="section-card">
    <div class="section-title">⚠️ מס יסף (3%)</div>
    <div class="form-row"><label>סף מס יסף (${year})</label><span class="computed-value">${formatNumber(TAX_DATA.surtaxThreshold[year])}</span><span class="unit">₪</span></div>
    <div class="form-row"><label>מס יסף חייב</label><span class="computed-value ${r.surtax > 0 ? 'negative' : ''}">${formatNumber(r.surtax)}</span><span class="unit">₪</span></div>
  </div>`;

  // ---- FINAL CALCULATION ----
  html += `<div class="section-card" id="final_${year}" style="border-color:var(--accent);border-width:2px">
    <div class="section-title">✅ חישוב סופי — החזר / חוב מס ${year}</div>

    <div class="form-row"><label>מס לפי מדרגות (לפני זיכויים)</label><span class="computed-value">${formatNumber(r.taxBeforeCredits)}</span><span class="unit">₪</span></div>
    <div class="form-row"><label>(-) שווי נקודות זיכוי</label><span class="computed-value positive">${formatNumber(r.creditPointsValue)}</span><span class="unit">₪</span></div>
    <div class="form-row"><label>(-) זיכויים נוספים</label><span class="computed-value positive">${formatNumber(r.totalAdditionalCredits)}</span><span class="unit">₪</span></div>
    <div class="form-row" style="font-weight:600"><label>מס נטו לתשלום</label><span class="computed-value negative">${formatNumber(r.netTaxOwed)}</span><span class="unit">₪</span></div>
    <div class="form-row"><label>מס ששולם בפועל (ניכוי במקור)</label><span class="computed-value">${formatNumber(r.totalTaxPaid)}</span><span class="unit">₪</span></div>

    <div style="border-top:2px solid var(--border);margin-top:12px;padding-top:12px">
      <div class="form-row"><label>--- פיצויים ---</label><span></span><span></span></div>
      <div class="form-row"><label>החזר/(חוב) מס על פיצויים</label><span class="computed-value ${r.severanceRefund >= 0 ? 'positive':'negative'}">${formatNumber(r.severanceRefund)}</span><span class="unit">₪</span></div>
      <div class="form-row"><label>--- הכנסות הון ---</label><span></span><span></span></div>
      <div class="form-row"><label>החזר/(חוב) הון</label><span class="computed-value ${r.capitalRefundAdjusted >= 0 ? 'positive':'negative'}">${formatNumber(r.capitalRefundAdjusted)}</span><span class="unit">₪</span></div>
      <div class="form-row"><label>--- אופציות ---</label><span></span><span></span></div>
      <div class="form-row"><label>החזר/(חוב) מס על אופציות</label><span class="computed-value ${r.optRefund >= 0 ? 'positive':'negative'}">${formatNumber(r.optRefund)}</span><span class="unit">₪</span></div>
      <div class="form-row"><label>(+) מס יסף (3%)</label><span class="computed-value negative">${formatNumber(r.surtax)}</span><span class="unit">₪</span></div>
      <div class="form-row"><label>(+) מס על שכירות דירה</label><span class="computed-value negative">${formatNumber(r.rentalTax)}</span><span class="unit">₪</span></div>
    </div>

    <div class="summary-row total" style="background:${r.totalRefund >= 0 ? 'var(--success-bg)' : 'var(--danger-bg)'};font-size:1.2rem">
      <label>${r.totalRefund >= 0 ? '🎉 החזר מס' : '⚠️ חוב מס'}</label>
      <span class="computed-value ${r.totalRefund >= 0 ? 'positive' : 'negative'}" style="font-size:1.3rem">${r.totalRefund >= 0 ? '+' : ''}${formatNumber(r.totalRefund)}</span>
      <span class="unit">₪</span>
    </div>
    <div style="text-align:center;font-size:0.8rem;color:var(--text-muted);margin-top:8px">
      חיובי = מגיע לך החזר  |  שלילי = חוב מס
    </div>
    ${r.totalRefund > 0 ? (() => {
      // הצמדה וריבית — 4% שנתי מסוף שנת המס עד היום
      const taxYearEnd = new Date(year, 11, 31); // 31 Dec of tax year
      const today = new Date();
      const msPerYear = 365.25 * 24 * 60 * 60 * 1000;
      const yearsFraction = Math.max(0, (today - taxYearEnd) / msPerYear);
      const indexationRate = 0.04;
      const indexationAmount = Math.floor(r.totalRefund * indexationRate * yearsFraction);
      const totalWithIndexation = r.totalRefund + indexationAmount;
      return `<div style="margin-top:12px;padding:12px;background:var(--purple-bg);border-radius:8px;border:1px solid rgba(139,92,246,0.2)">
        <div style="font-size:0.85rem;color:var(--purple);font-weight:600;margin-bottom:8px">📈 הצמדה וריבית (הערכה)</div>
        <div class="form-row"><label>תקופה מסוף ${year} עד היום</label><span class="computed-value">${yearsFraction.toFixed(2)} שנים</span><span class="unit"></span></div>
        <div class="form-row"><label>ריבית והצמדה (4% שנתי)</label><span class="computed-value positive">+${formatNumber(indexationAmount)}</span><span class="unit">₪</span></div>
        <div class="form-row" style="font-weight:600"><label>החזר כולל הצמדה (הערכה)</label><span class="computed-value positive" style="font-size:1.1rem">+${formatNumber(totalWithIndexation)}</span><span class="unit">₪</span></div>
        <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">* הערכה בלבד — הסכום בפועל נקבע ע"י פקיד השומה לפי מדד בפועל</div>
      </div>`;
    })() : ''}
  </div>`;

  // Placeholders for async upload section and checklist
  html += `<div id="uploadContainer_${year}"><div class="section-card" style="text-align:center;color:var(--text-muted);padding:24px">טוען מסמכים...</div></div>`;
  html += `<div id="checklistContainer_${year}">${buildYearChecklist(year)}</div>`;

  return html;
}

// Populate upload section async after panel renders
async function populateUploadSection(year) {
  const container = document.getElementById('uploadContainer_' + year);
  if (!container) return;
  const uploadHtml = await buildUploadSection(year);
  container.innerHTML = uploadHtml;
}

function buildSummaryPanel() {
  const {results, lossTracker, adjusted} = calcSummary();

  // Top stats
  let totalRefund = 0, yearsWithRefund = 0;
  let totalLossBalance = 0;
  years.forEach(y => {
    totalRefund += adjusted[y].totalRefund;
    if (adjusted[y].totalRefund > 0) yearsWithRefund++;
  });
  totalLossBalance = lossTracker[2025]?.endBalance || 0;

  let html = `<div class="stats-grid">
    <div class="stat-card ${totalRefund >= 0 ? 'positive' : 'negative'}">
      <div class="stat-value">${totalRefund >= 0 ? '+' : ''}${formatNumber(totalRefund)}</div>
      <div class="stat-label">סה"כ החזר מתואם</div>
    </div>
    <div class="stat-card info">
      <div class="stat-value">${yearsWithRefund}</div>
      <div class="stat-label">שנים עם החזר</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-value">${formatNumber(totalLossBalance)}</div>
      <div class="stat-label">הפסדי הון מועברים</div>
    </div>
  </div>`;

  // Part A: Year data
  html += `<div class="section-card">
    <div class="section-title">📋 חלק א׳: נתוני שנה</div>
    <table class="data-table">
      <thead><tr><th></th>`;
  years.forEach(y => html += `<th>${y}</th>`);
  html += `<th>סה"כ</th></tr></thead><tbody>`;

  const rows = [
    {label:'הכנסה חייבת מעבודה', key: y => formatNumber(results[y].totalWorkIncome)},
    {label:'מס נטו לתשלום', key: y => formatNumber(results[y].netTaxOwed)},
    {label:'מס ששולם בפועל', key: y => formatNumber(results[y].totalTaxPaid)},
    {label:'הכנסות הון נטו', key: y => formatNumber(results[y].totalCapitalIncome)},
    {label:'פיצויים — החזר/(חוב)', key: y => formatNumber(results[y].severanceRefund)},
    {label:'מס יסף', key: y => formatNumber(results[y].surtax)},
  ];
  rows.forEach(row => {
    html += `<tr><td style="font-weight:600">${row.label}</td>`;
    let total = 0;
    years.forEach(y => {
      html += `<td>${row.key(y)}</td>`;
    });
    html += `<td></td></tr>`;
  });
  html += `</tbody></table></div>`;

  // Part B: Loss carryforward
  html += `<div class="section-card">
    <div class="section-title">📈 חלק ב׳: מעקב הפסדי הון בין שנים</div>
    <table class="data-table">
      <thead><tr><th></th>`;
  years.forEach(y => html += `<th>${y}</th>`);
  html += `</tr></thead><tbody>`;

  // Reconstruct loss tracker properly
  let cf = 0;
  const lt2 = {};
  years.forEach(y => {
    const s = state[y];
    const r = results[y];
    const beginning = cf;
    const newLoss = (s.capitalLossCarryforward||0) + (r.totalCapitalIncome < 0 ? -r.totalCapitalIncome : 0);
    const available = beginning + newLoss;
    const used = Math.min(available, Math.max(r.totalCapitalIncome, 0));
    cf = available - used;
    lt2[y] = {beginning, newLoss, available, used, end: cf, savings: used * 0.25};
  });

  const lossRows = [
    {label:'יתרת הפסדים — תחילת שנה', key: y => formatNumber(lt2[y].beginning)},
    {label:'(+) הפסדי הון חדשים', key: y => formatNumber(lt2[y].newLoss)},
    {label:'סה"כ זמינים לקיזוז', key: y => formatNumber(lt2[y].available)},
    {label:'הפסד מועבר שנוצל', key: y => formatNumber(lt2[y].used)},
    {label:'יתרת הפסדים — סוף שנה', key: y => formatNumber(lt2[y].end)},
    {label:'חיסכון מס מקיזוז', key: y => formatNumber(lt2[y].savings)},
  ];
  lossRows.forEach(row => {
    html += `<tr><td style="font-weight:600">${row.label}</td>`;
    years.forEach(y => html += `<td>${row.key(y)}</td>`);
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;

  // Part C: Adjusted refunds
  html += `<div class="section-card">
    <div class="section-title">✅ חלק ג׳: החזר מס מתואם</div>
    <table class="data-table">
      <thead><tr><th></th>`;
  years.forEach(y => html += `<th>${y}</th>`);
  html += `<th>סה"כ</th></tr></thead><tbody>`;

  const adjRows = [
    {label:'החזר/(חוב) מס שכר', key:'workRefund'},
    {label:'החזר/(חוב) פיצויים', key:'severanceRefund'},
    {label:'החזר/(חוב) אופציות', key:'optRefund'},
    {label:'החזר/(חוב) הון מתואם', key:'capitalRefund'},
    {label:'(-) מס יסף', key:'surtax'},
    {label:'(-) מס שכירות', key:'rentalTax'},
  ];
  adjRows.forEach(row => {
    html += `<tr><td style="font-weight:600">${row.label}</td>`;
    let total = 0;
    years.forEach(y => {
      const val = adjusted[y][row.key];
      total += val;
      html += `<td style="color:${val >= 0 ? 'var(--success)' : 'var(--danger)'}">${formatNumber(val)}</td>`;
    });
    html += `<td style="font-weight:700">${formatNumber(total)}</td></tr>`;
  });

  // Total refund row
  html += `<tr style="background:var(--accent-light);font-weight:700;font-size:1rem">
    <td>החזר מס / (חוב מס) — מתואם</td>`;
  let grandTotal = 0;
  years.forEach(y => {
    const val = adjusted[y].totalRefund;
    grandTotal += val;
    html += `<td style="color:${val >= 0 ? 'var(--success)' : 'var(--danger)'}">${val >= 0 ? '+' : ''}${formatNumber(val)}</td>`;
  });
  html += `<td style="color:${grandTotal >= 0 ? 'var(--success)' : 'var(--danger)'}; font-size:1.1rem">${grandTotal >= 0 ? '+' : ''}${formatNumber(grandTotal)}</td></tr>`;
  html += `</tbody></table></div>`;

  // Chart - Bar chart
  html += `<div class="chart-container">
    <div class="section-title">📊 החזר/(חוב) מס מתואם לפי שנה</div>
    <div class="bar-chart">`;
  const maxVal = Math.max(...years.map(y => Math.abs(adjusted[y].totalRefund)), 1);
  years.forEach(y => {
    const val = adjusted[y].totalRefund;
    const height = Math.max(Math.abs(val) / maxVal * 160, 2);
    const cls = val > 0 ? 'positive' : (val < 0 ? 'negative' : 'zero');
    html += `<div class="bar-group">
      <div class="bar ${cls}" style="height:${height}px"></div>
      <div class="bar-label">${y}</div>
      <div class="bar-value">${val >= 0 ? '+' : ''}${formatNumber(val)} ₪</div>
    </div>`;
  });
  html += `</div></div>`;

  // Loss carryforward chart
  html += `<div class="chart-container">
    <div class="section-title">📉 יתרת הפסדי הון מצטברים</div>
    <div class="bar-chart">`;
  const maxLoss = Math.max(...years.map(y => lt2[y].end), 1);
  years.forEach(y => {
    const val = lt2[y].end;
    const height = maxLoss > 0 ? Math.max(val / maxLoss * 160, 2) : 2;
    html += `<div class="bar-group">
      <div class="bar" style="height:${height}px;background:linear-gradient(180deg,var(--purple),#6d28d9)"></div>
      <div class="bar-label">${y}</div>
      <div class="bar-value">${formatNumber(val)} ₪</div>
    </div>`;
  });
  html += `</div></div>`;

  html += `<div class="tip-box">💡 חישוב המס ההוני מבוסס על שיעור מס יחסי לפי תמהיל ההכנסות. חיסכון המס מקיזוז הפסדים מועברים כבר משתקף בשורת ההחזר המתואמת.</div>`;

  return html;
}

// =============================================
// RENDER & EVENT HANDLING
// =============================================
function renderAllPanels() {
  const container = document.getElementById('panelContainer');
  let html = '';

  html += `<div class="tab-panel active" data-panel="docs">${buildDocsPanel()}</div>`;
  html += `<div class="tab-panel" data-panel="ref">${buildRefPanel()}</div>`;
  years.forEach(y => {
    html += `<div class="tab-panel" data-panel="y${y}">${buildYearPanel(y)}</div>`;
  });
  html += `<div class="tab-panel" data-panel="summary">${buildSummaryPanel()}</div>`;
  html += `<div class="tab-panel" data-panel="planning">${buildPlanningPanel()}</div>`;

  container.innerHTML = html;
  attachInputListeners();
  // Populate upload sections async for all years
  years.forEach(y => populateUploadSection(y));
}

function renderCurrentTab() {
  const activeTab = document.querySelector('.tab.active');
  const tabId = activeTab?.dataset.tab;
  if (!tabId) return;

  const panel = document.querySelector(`[data-panel="${tabId}"]`);
  if (!panel) return;

  if (tabId.startsWith('y')) {
    const year = parseInt(tabId.slice(1));
    panel.innerHTML = buildYearPanel(year);
    populateUploadSection(year);
  } else if (tabId === 'summary') {
    panel.innerHTML = buildSummaryPanel();
  } else if (tabId === 'docs') {
    panel.innerHTML = buildDocsPanel();
  }
  attachInputListeners();
}

function attachInputListeners() {
  document.querySelectorAll('input[data-year], select[data-year]').forEach(el => {
    if (el.tagName === 'SELECT') {
      el.addEventListener('change', function() {
        const year = parseInt(this.dataset.year);
        const key = this.dataset.key;
        state[year][key] = parseInt(this.value);
        autoSave();
        renderCurrentTab();
      });
    } else if (el.tagName === 'INPUT') {
      // On blur: evaluate formula if present, then update
      el.addEventListener('blur', function() {
        const year = parseInt(this.dataset.year);
        const key = this.dataset.key;
        const raw = this.value.trim();

        // Check if it's a formula (contains +, -, *, / with digits)
        if (raw && /[+\-*/]/.test(raw) && /\d/.test(raw)) {
          const result = evalFormula(raw);
          if (result !== null) {
            state[year][key] = result;
            state[year]['_formula_' + key] = raw;
            this.value = raw;
            this.title = 'נוסחה: ' + raw + ' = ' + result.toLocaleString('he-IL');
            this.classList.add('has-formula');
            autoSave();
            renderCurrentTab();
            return;
          }
        }

        // Plain number
        const val = parseFloat(raw.replace(/,/g, '')) || 0;
        state[year][key] = val;
        delete state[year]['_formula_' + key];
        this.classList.remove('has-formula');
        autoSave();
        renderCurrentTab();
      });
      // On input: update state in real-time (for plain numbers)
      el.addEventListener('input', function() {
        const year = parseInt(this.dataset.year);
        const key = this.dataset.key;
        const raw = this.value.trim();
        // Only update if it's a plain number (not mid-formula)
        if (!/[+\-*/]/.test(raw)) {
          state[year][key] = parseFloat(raw.replace(/,/g, '')) || 0;
        }
      });
      // On focus: if has formula, show the formula for editing
      el.addEventListener('focus', function() {
        const year = parseInt(this.dataset.year);
        const key = this.dataset.key;
        const formula = state[year]['_formula_' + key];
        if (formula) {
          this.value = formula;
        }
      });
    }
  });
}

// Tab switching
document.getElementById('mainTabs').addEventListener('click', function(e) {
  const tab = e.target.closest('.tab');
  if (!tab) return;

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

  tab.classList.add('active');
  const panel = document.querySelector(`[data-panel="${tab.dataset.tab}"]`);
  if (panel) {
    panel.classList.add('active');
    renderCurrentTab();
  }
});

// Scroll to section
function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

// Theme toggle
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('taxCalcTheme', next);
}

// Document checklist
function toggleDoc(id, checkbox) {
  const docs = JSON.parse(localStorage.getItem('taxCalc_docs_' + currentClientId) || '{}');
  docs[id] = checkbox.checked;
  localStorage.setItem('taxCalc_docs_' + currentClientId, JSON.stringify(docs));

  const item = checkbox.closest('.checklist-item');
  item.classList.toggle('checked', checkbox.checked);

  // Update count
  const total = document.querySelectorAll('.checklist-item').length;
  const checked = Object.values(docs).filter(v=>v).length;
  const countEl = document.getElementById('docsCount');
  const percentEl = document.getElementById('docsPercent');
  const progressEl = document.getElementById('docsProgress');
  if (countEl) countEl.textContent = `${checked}/${total}`;
  if (percentEl) percentEl.textContent = `${Math.round(checked/total*100)}%`;
  if (progressEl) progressEl.style.width = `${checked/total*100}%`;
}

// Export/Import
function exportData() {
  const client = getCurrentClient();
  const exportObj = { clientName: client?.name || '', data: state };
  const data = JSON.stringify(exportObj, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = (client?.name || 'client').replace(/[^a-zA-Z0-9֐-׿]/g, '_');
  a.href = url;
  a.download = `tax-refund-${safeName}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('קובץ נשמר — ' + (client?.name || ''));
}

function printReport() {
  // Show a print header with client name and date
  const client = getCurrentClient();
  const clientName = client?.name || '';
  let header = document.getElementById('print-header');
  if (!header) {
    header = document.createElement('div');
    header.id = 'print-header';
    header.className = 'print-header';
    header.style.display = 'none';
    document.body.prepend(header);
  }
  header.innerHTML = `<h1>דוח החזר מס — ${clientName || 'ללא שם'}</h1><p>הופק בתאריך: ${new Date().toLocaleDateString('he-IL')} | שנות מס: ${years.join(', ')}</p>`;

  // Mark the summary tab as print-active so it shows in print
  const panes = document.querySelectorAll('.tab-pane');
  const summaryTab = document.getElementById('tab-summary');
  panes.forEach(p => p.classList.remove('print-active'));
  if (summaryTab) summaryTab.classList.add('print-active');

  // Also show each year tab in print
  years.forEach(y => {
    const yearTab = document.getElementById('tab-' + y);
    if (yearTab) yearTab.classList.add('print-active');
  });

  window.print();

  // Cleanup after print
  setTimeout(() => {
    panes.forEach(p => p.classList.remove('print-active'));
  }, 1000);
}

function importData() {
  document.getElementById('fileInput').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      // Support both old format (direct state) and new format ({clientName, data})
      const data = parsed.data || parsed;
      years.forEach(y => {
        if (data[y]) Object.assign(state[y], data[y]);
      });
      autoSave();
      renderAllPanels();
      showToast('נתונים נטענו — ' + (getCurrentClient()?.name || ''));
    } catch(err) {
      showToast('שגיאה בטעינת הקובץ');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Toast
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// =============================================
// INIT
// =============================================
async function init() {
  // Load theme
  const savedTheme = localStorage.getItem('taxCalcTheme');
  if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

  // Open IndexedDB for file storage
  try { await openDB(); } catch(e) { console.warn('IndexedDB unavailable:', e); }

  // Load clients and state
  loadClients();
  initState();
  renderClientList();
  updateClientBadge();
  renderAllPanels();
}

init();
</script>
